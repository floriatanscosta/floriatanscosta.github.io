<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D100 Volume Calculator v2.0</title>
    <style>
        * {
            box-sizing: border-box
        }

        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background: #f4f6f8
        }

        .layout {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(450px, 1fr));
            gap: 20px
        }

        .container {
            background: #fff;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 10px rgba(0, 0, 0, .1)
        }

        h1,
        h2,
        h3 {
            color: #25487c;
            margin-top: 0
        }

        .campo {
            margin-bottom: 12px
        }

        label {
            font-weight: bold;
            display: block;
            margin-bottom: 5px
        }

        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px
        }

        .label-row {
            display: flex;
            gap: 8px;
            align-items: center
        }

        .tip {
            cursor: help;
            color: #25487c;
            font-weight: bold
        }

        .botoes {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 15px
        }

        button {
            padding: 10px 16px;
            border: none;
            border-radius: 6px;
            color: white;
            cursor: pointer
        }

        .calc {
            background: #25487c
        }

        .clear {
            background: #777
        }

        .csv {
            background: #198754
        }

        .print {
            background: #6f42c1
        }

        .msg {
            display: none;
            padding: 10px;
            border-radius: 6px;
            margin-top: 12px
        }

        .msg.erro {
            display: block;
            background: #fdeaea;
            color: #8a1f1f
        }

        .resultado {
            display: none;
            background: #e7eef7;
            padding: 12px;
            border-radius: 6px;
            margin-top: 15px
        }

        .placeholder {
            min-height: 180px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #666;
            font-style: italic
        }

        .table-wrapper {
            display: none;
            max-height: 600px;
            overflow: auto;
            border: 1px solid #ddd
        }

        table {
            width: 100%;
            border-collapse: collapse
        }

        th,
        td {
            border: 1px solid #ccc;
            padding: 8px;
            text-align: center
        }

        thead th {
            position: sticky;
            top: 0;
            background: #25487c;
            color: white
        }

        .stats {
            display: none;
            margin-top: 15px;
            background: #eef4ff;
            padding: 10px;
            border-radius: 6px
        }

        @media print {
            body {
                background: white;
                padding: 0
            }

            .botoes,
            .msg,
            .tip {
                display: none !important
            }

            .layout {
                display: block
            }

            .container {
                box-shadow: none;
                border: none;
                padding: 0
            }

            .table-wrapper {
                display: block !important;
                max-height: none;
                overflow: visible
            }

            .resultado,
            .stats {
                display: block !important
            }

            thead {
                display: table-header-group
            }
        }
    </style>
</head>

<body>
    <div class="layout">
        <div class="container">
            <h1>D100 Volume Calculator v2.0</h1>

            <div class="campo">
                <div class="label-row"><label>Volume inicial (nL)</label><span class="tip"
                        title="Volume da primeira gota">ⓘ</span></div>
                <input id="volumeInicial" type="number" value="10" step="0.1">
            </div>

            <div class="campo">
                <div class="label-row"><label>Incremento por ponto (nL)</label><span class="tip"
                        title="Incremento aplicado a cada ponto">ⓘ</span></div>
                <input id="incremento" type="number" value="0.5" step="0.1">
            </div>

            <div class="campo">
                <div class="label-row"><label>Quantidade de pontos</label><span class="tip"
                        title="Número total de dispersões">ⓘ</span></div>
                <input id="quantidadePontos" type="number" value="180">
            </div>

            <div class="campo">
                <label>Volume morto (µL)</label>
                <input id="deadVolume" type="number" value="0">
            </div>

            <div class="campo">
                <label>Margem de segurança (%)</label>
                <input id="seguranca" type="number" value="10">
            </div>

            <div class="botoes">
                <button class="calc" onclick="calcular()">Calcular</button>
                <button class="clear" onclick="limparCampos()">Limpar</button>
                <button class="csv" onclick="exportarCSV()">Exportar CSV</button>
                <button class="print" onclick="window.print()">Imprimir</button>
            </div>

            <div id="msg" class="msg"></div>
            <div id="resultado" class="resultado"></div>
            <div id="stats" class="stats"></div>
        </div>

        <div class="container">
            <h2>Tabela de volumes</h2>
            <div id="placeholder" class="placeholder">Execute o cálculo para visualizar os resultados.</div>
            <div class="table-wrapper" id="tableWrapper">
                <table id="tabela">
                    <thead>
                        <tr>
                            <th>Ponto</th>
                            <th>Volume (nL)</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        function mensagem(txt) {
            let m = document.getElementById('msg');
            m.className = 'msg erro';
            m.innerHTML = txt;
        }
        function ocultarMensagem() {
            let m = document.getElementById('msg');
            m.className = 'msg';
            m.style.display = 'none';
            m.innerHTML = '';
        }

        function calcular() {
            const v0 = parseFloat(volumeInicial.value);
            const inc = parseFloat(incremento.value);
            const n = parseInt(quantidadePontos.value);
            const dead = parseFloat(deadVolume.value || 0);
            const seg = parseFloat(seguranca.value || 0);

            if (isNaN(v0) || isNaN(inc) || isNaN(n)) {
                mensagem('⚠️ É necessário preencher todos os campos obrigatórios.');
                return;
            }
            ocultarMensagem();

            let total = 0;
            let tbody = document.querySelector('#tabela tbody');
            tbody.innerHTML = '';

            for (let i = 0; i < n; i++) {
                let v = v0 + i * inc;
                total += v;
                tbody.innerHTML += `<tr><td>${i + 1}</td><td>${v.toFixed(2)}</td></tr>`;
            }

            let totalUL = total / 1000;
            let necessario = (totalUL + dead) * (1 + seg / 100);

            resultado.style.display = 'block';
            resultado.innerHTML = `
 <h3>Resultado</h3>
 <p><b>Volume dispensado:</b> ${total.toFixed(2)} nL (${totalUL.toFixed(3)} µL)</p>
 <p><b>Último ponto:</b> ${(v0 + (n - 1) * inc).toFixed(2)} nL</p>
 <p><b>Volume morto:</b> ${dead.toFixed(3)} µL</p>
 <p><b>Margem:</b> ${seg}%</p>
 <p><b>Volume total necessário:</b> ${necessario.toFixed(3)} µL</p>
 <p><b>Data:</b> ${new Date().toLocaleString()}</p>`;

            stats.style.display = 'block';
            stats.innerHTML = `
 <b>Estatísticas</b><br>
 Menor volume: ${v0.toFixed(2)} nL<br>
 Maior volume: ${(v0 + (n - 1) * inc).toFixed(2)} nL<br>
 Volume médio: ${(total / n).toFixed(2)} nL`;

            placeholder.style.display = 'none';
            tableWrapper.style.display = 'block';
        }

        function limparCampos() {
            volumeInicial.value = '';
            incremento.value = '';
            quantidadePontos.value = '';
            deadVolume.value = '0';
            seguranca.value = '10';
            resultado.style.display = 'none';
            stats.style.display = 'none';
            document.querySelector('#tabela tbody').innerHTML = '';
            tableWrapper.style.display = 'none';
            placeholder.style.display = 'flex';
            ocultarMensagem();
        }

        function exportarCSV() {
            const rows = [...document.querySelectorAll('#tabela tr')];
            if (rows.length <= 1) { mensagem('⚠️ Execute um cálculo antes de exportar.'); return; }
            let csv = rows.map(r => [...r.children].map(c => c.innerText).join(';')).join('\\n');
            let blob = new Blob([csv], { type: 'text/csv' });
            let a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'd100_volumes.csv';
            a.click();
        }
    </script>
</body>

</html>
