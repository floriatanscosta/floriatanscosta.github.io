<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gerador de Assinatura para E-mail Dinâmico</title>
  <meta property="og:image" content="https://floriatanscosta.github.io/img/gerador/cover.png">

  <style>
    body {
      font-family: Roboto, Tahoma, Arial, Verdana, sans-serif;
      background-color: #f3f4f6;
      margin: 0;
      padding: 30px;
      display: flex;
      justify-content: center;
    }

    .container {display: flex;
      flex-direction: row;
      gap: 30px;
      max-width: 1300px;
      width: 100%;
      background: #ffffff;
      padding: 30px;
      border-radius: 8px;
      box-shadow: 0 1px 8px rgba(0, 0, 0, 0.1);
    }

    .form-section {
      flex: 1;
      min-width: 320px;
    }

    .preview-section {
      flex: 1.2;
      border-left: 2px solid #ffffff;
      padding-left: 30px;
      display: flex;
      flex-direction: column;
    }

    h2 {
      color: #223D71;
      margin-top: 0;
      margin-bottom: 20px;
    }

    .form-group {
      margin-bottom: 15px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #4b5563;
      margin-bottom: 5px;
    }

    input,
    select {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid #d1d5db;
      border-radius: 4px;
      font-size: 14px;
      box-sizing: border-box;
      background-color: #fff;
    }

    input:focus,
    select:focus {
      outline: none;
      border-color: #223D71;
      box-shadow: 0 0 0 3px rgba(34, 61, 113, 0.1);
    }

    .preview-box {
      border: 1px solid #e4e4e4;
      padding: 20px;
      background: #ffffff;
      border-radius: 6px;
      min-height: 200px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 3px 10px rgba(0, 0, 0, 0.08);
    }

    .btn-copy {
      background-color: #223D71;
      color: #fff;
      border: none;
      padding: 14px 20px;
      font-size: 15px;
      font-weight: bold;
      border-radius: 4px;
      cursor: pointer;
      margin-top: 20px;
      transition: background-color 0.2s;
    }

    .btn-copy:hover {
      background-color: #162a50;
    }

    .alert {
      margin-top: 10px;
      font-size: 14px;
      color: #16a34a;
      display: none;
      font-weight: 500;
      text-align: center;
    }

    .tip {
      font-size: 12px;
      color: #6b7280;
      margin-top: 2px;
    }

    @media (max-width: 800px) {
      .container {
        flex-direction: column;
      }

      .preview-section {
        border-left: none;
        padding-left: 0;
        border-top: 2px solid #e5e7eb;
        padding-top: 30px;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <!-- Formulário para Inserção dos Dados -->
    <div class="form-section">
      <h2>Dados da Assinatura</h2>

      <div class="form-group">
        <label for="select-logo">Logo da Instituição</label>
        <select id="select-logo">
          <option value="https://floriatanscosta.github.io/img/gerador/logo1-gerador.png">Logo 1 - UFPR</option>
          <option value="https://floriatanscosta.github.io/img/gerador/logo2-gerador.png">Logo 2 - UFPR/Química</option>
          <option value="https://floriatanscosta.github.io/img/gerador/logo3-gerador.png">Logo 3 - UFPR/LAESB</option>
        </select>
      </div>

      <div class="form-group">
        <label for="input-nome">Nome</label>
        <input type="text" id="input-nome" value="Floriatan Santos Costa">
      </div>

      <div class="form-group">
        <label for="input-cargo">Cargo ou título</label>
        <input type="text" id="input-cargo" value="Investigador Posdoctoral">
      </div>

      <div class="form-group">
        <label for="input-lab1">Laboratório</label>
        <input type="text" id="input-lab1" value="Laboratorio de Espectrometría, Sensores y Biosensores">
      </div>

      <div class="form-group">
        <label for="input-inst1">Instituição</label>
        <input type="text" id="input-inst1" value="Universidade Federal do Paraná">
      </div>

      <div class="form-group">
        <label for="input-lab2">Laboratório (se houver)</label>
        <input type="text" id="input-lab2" value="Métodos de Análisis Rápidos con Técnicas Espectroscópicas">
        <div class="tip">Apague para ocultar</div>
      </div>

      <div class="form-group">
        <label for="input-inst2">Instituição (se houver)</label>
        <input type="text" id="input-inst2" value="Universidad de Zaragoza">
        <div class="tip">Apague para ocultar</div>
      </div>

      <div class="form-group">
        <label for="input-url-web">Site pessoal</label>
        <input type="text" id="input-url-web" value="https://floriatanscosta.github.io/">
        <div class="tip">Apague para ocultar</div>
      </div>

      <div class="form-group">
        <label for="input-url-lattes">Currículo Lattes</label>
        <input type="text" id="input-url-lattes" value="http://lattes.cnpq.br/0287106268880389">
        <div class="tip">Apague para ocultar</div>
      </div>

      <div class="form-group">
        <label for="input-url-orcid">Link do OrcID</label>
        <input type="text" id="input-url-orcid" value="https://orcid.org/0000-0001-7766-2860">
        <div class="tip">Apague para ocultar</div>
      </div>
    </div>

    <!-- Visualização e Ação de Copiar -->
    <div class="preview-section">
      <h2>Visualização (real time)</h2>
      <div class="preview-box" id="preview-container">
      </div>
      <button class="btn-copy" onclick="copiarAssinatura()">Copiar assinatura</button>
      <div class="alert" id="success-alert">CONTEÚDO CÓPIADO COM SUCESSO!</div>
    </div>
  </div>

  <script>
    function atualizarAssinatura() {
      const logoUrl = document.getElementById('select-logo').value;
      const nome = document.getElementById('input-nome').value.trim();
      const cargo = document.getElementById('input-cargo').value.trim();
      const lab1 = document.getElementById('input-lab1').value.trim();
      const inst1 = document.getElementById('input-inst1').value.trim();
      const lab2 = document.getElementById('input-lab2').value.trim();
      const inst2 = document.getElementById('input-inst2').value.trim();
      const urlWeb = document.getElementById('input-url-web').value.trim();
      const urlLattes = document.getElementById('input-url-lattes').value.trim();
      const urlOrcid = document.getElementById('input-url-orcid').value.trim();

      const blocoNome = nome ? `<div style="font-size: 18px; font-weight: 800; color: #223D71; margin-bottom: 2px; letter-spacing: 0.5px;">${nome}</div>` : '';
      const blocoCargo = cargo ? `<div style="font-size: 12px; font-weight: 600; color: #4b5563; margin-bottom: 12px; letter-spacing: 0.5px;">${cargo}</div>` : '';

      const blocoLab1 = lab1 ? `<div style="font-size: 12px; color: #1f2937; font-weight: 600; margin-bottom: 1px;">${lab1}</div>` : '';

      const marginInst1 = (lab2 || inst2 || urlWeb || urlLattes || urlOrcid) ? '8px' : '0px';
      const blocoInst1 = inst1 ? `<div style="font-size: 12px; color: #6b7280; font-weight: 500; margin-bottom: ${marginInst1};">${inst1}</div>` : '';

      const blocoLab2 = lab2 ? `<div style="font-size: 12px; color: #1f2937; font-weight: 600; margin-bottom: 1px;">${lab2}</div>` : '';
      const marginInst2 = (urlWeb || urlLattes || urlOrcid) ? '20px' : '0px';
      const blocoInst2 = inst2 ? `<div style="font-size: 12px; color: #6b7280; font-weight: 500; margin-bottom: ${marginInst2};">${inst2}</div>` : '';

      const celulaWeb = urlWeb ? `
      <td style="padding-right: 14px; vertical-align: middle;">
        <a href="${urlWeb}" target="_blank" style="text-decoration: none; display: block;">
          <img src="https://floriatanscosta.github.io/img/gerador/link-gerador.png" alt="CV" style="height: 20px; width: auto; display: block;" height="20" title="Currículum Vitae">
        </a>
      </td>` : '';

      const celulaLattes = urlLattes ? `
      <td style="padding-right: 14px; vertical-align: middle;">
        <a href="${urlLattes}" target="_blank" style="text-decoration: none; display: block;">
          <img src="https://floriatanscosta.github.io/img/gerador/lattes-gerador.png" alt="Lattes" style="height: 20px; width: auto; display: block;" height="20" title="Currículo Lattes">
        </a>
      </td>` : '';

      const celulaOrcid = urlOrcid ? `
      <td style="vertical-align: middle;">
        <a href="${urlOrcid}" target="_blank" style="text-decoration: none; display: block;">
          <img src="https://floriatanscosta.github.io/img/gerador/orcid-gerador.png" alt="ORCID" style="height: 20px; width: auto; display: block;" height="20" title="ORCID iD">
        </a>
      </td>` : '';

      const blocoSocial = (urlWeb || urlLattes || urlOrcid) ? `
      <table cellpadding="0" cellspacing="0" style="border-collapse: collapse;">
        <tr>
          ${celulaWeb}
          ${celulaLattes}
          ${celulaOrcid}
        </tr>
      </table>` : '';

      const assinaturaHTML = `
<table cellpadding="0" cellspacing="0" style="font-family: 'Roboto', Helvetica, Arial, sans-serif; font-size: 14px; color: #333333; line-height: 1.2; min-width: 480px; max-width: 650px; text-align: left;">
  <tr>
    <td style="vertical-align: middle; padding-right: 20px; width: 110px;">
      <img src="${logoUrl}" alt="Logo Institucional" style="width: 110px; height: auto; display: block;" width="110">
    </td>
    <td style="vertical-align: top; width: 2px; background-color: #dfe5f1; padding: 0;"></td>
    <td style="vertical-align: middle; padding-left: 20px;">
      ${blocoNome}
      ${blocoCargo}
      ${blocoLab1}
      ${blocoInst1}
      ${blocoLab2}
      ${blocoInst2}
      ${blocoSocial}
    </td>
  </tr>
</table>`;

      document.getElementById('preview-container').innerHTML = assinaturaHTML;
    }

    async function copiarAssinatura() {
      const previewBox = document.getElementById('preview-container');
      const alertBox = document.getElementById('success-alert');

      try {
        const blob = new Blob([previewBox.innerHTML], { type: 'text/html' });
        const data = [new ClipboardItem({ 'text/html': blob })];

        await navigator.clipboard.write(data);

        alertBox.style.display = 'block';
        setTimeout(() => {
          alertBox.style.display = 'none';
        }, 5000);
      } catch (err) {
        alert('Falha ao copiar automaticamente. Por favor, selecione a assinatura visualmente com o mouse, use Ctrl+C e depois Ctrl+V no seu e-mail.');
      }
    }

    document.getElementById('select-logo').addEventListener('change', atualizarAssinatura);

    const inputs = document.querySelectorAll('input');
    inputs.forEach(input => {
      input.addEventListener('input', atualizarAssinatura);
    });

    atualizarAssinatura();
  </script>

</body>

</html>
